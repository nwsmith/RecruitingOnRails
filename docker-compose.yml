services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: RecruitingOnRails_development
      MYSQL_USER: ${DB_USERNAME:-recruiting}
      MYSQL_PASSWORD: ${DB_PASSWORD:-recruiting}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_started
    environment:
      DB_USERNAME: ${DB_USERNAME:-recruiting}
      DB_PASSWORD: ${DB_PASSWORD:-recruiting}
      DB_HOST: db
      RAILS_ENV: ${RAILS_ENV:-development}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-devsecret}
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle

volumes:
  db_data:
  bundle_cache:
