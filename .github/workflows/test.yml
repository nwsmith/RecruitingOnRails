name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: recruiting
          MYSQL_PASSWORD: recruiting
          MYSQL_DATABASE: RecruitingOnRails_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      RAILS_ENV: test
      DB_USERNAME: recruiting
      DB_PASSWORD: recruiting
      DB_HOST: 127.0.0.1
      DB_PORT: 3306

    steps:
      - uses: actions/checkout@v4

      - name: Install MySQL client headers
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is up"
              break
            fi
            echo "Waiting for MySQL... ($i)"
            sleep 2
          done

      - name: Grant privileges to recruiting user
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "
            GRANT ALL PRIVILEGES ON \`RecruitingOnRails_test\`.* TO 'recruiting'@'%';
            FLUSH PRIVILEGES;
          "

      - name: Generate config/database.yml
        # config/database.yml is gitignored (legacy "may contain secrets"
        # convention), so it doesn't exist in a fresh checkout. Write a
        # minimal version that points the test environment at the MySQL
        # service container. Production block must parse without env vars
        # because Rails reads all environments at boot.
        run: |
          cat > config/database.yml <<'YML'
          test:
            adapter: mysql2
            encoding: utf8
            database: RecruitingOnRails_test
            username: recruiting
            password: recruiting
            host: 127.0.0.1
            port: 3306
            pool: 5

          development:
            adapter: mysql2
            encoding: utf8
            database: RecruitingOnRails_development
            username: recruiting
            password: recruiting
            host: 127.0.0.1
            port: 3306
            pool: 5

          production:
            adapter: mysql2
            encoding: utf8
            database: RecruitingOnRails_production
            username: <%= ENV.fetch("DB_USERNAME", "unused") %>
            password: <%= ENV.fetch("DB_PASSWORD", "unused") %>
            host: 127.0.0.1
            port: 3306
            pool: 5
          YML

      - name: Load schema
        run: bundle exec rake db:schema:load

      - name: Run tests
        run: bundle exec rake test

      - name: Lint with rubocop (rails-omakase preset)
        run: bundle exec rubocop --format github

      - name: Security scan with brakeman
        run: bundle exec brakeman --quiet --no-pager -i config/brakeman.ignore
